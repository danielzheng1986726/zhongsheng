<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一幕 · 开场钩子</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  background: linear-gradient(135deg, #0e0818, #1a0a2e);
  color: #fff;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  width: 100%;
  max-width: 400px;
  min-height: 90vh;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.badge {
  display: inline-block;
  background: #e63946;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
  letter-spacing: 2px;
  align-self: flex-start;
}
h1 {
  font-size: 32px;
  font-weight: 900;
  color: #f8d56e;
  line-height: 1.3;
}
.subtitle {
  font-size: 16px;
  color: #aaa;
  border-left: 3px solid #e63946;
  padding-left: 12px;
}
.section {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 16px;
}
.section h2 {
  font-size: 15px;
  color: #e87850;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section p, .section li {
  font-size: 18px;
  line-height: 1.7;
  color: #e0e0e0;
}
.section ul {
  list-style: none;
  padding: 0;
}
.section li::before {
  content: "→ ";
  color: #e63946;
  font-weight: bold;
}
.highlight {
  color: #50e0b0;
  font-weight: 700;
}
.quote {
  background: rgba(248, 213, 110, 0.1);
  border-left: 4px solid #f8d56e;
  padding: 14px 16px;
  border-radius: 0 8px 8px 0;
  font-size: 20px;
  font-weight: 600;
  color: #f8d56e;
  line-height: 1.5;
}
.timer {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>
<div class="card">
  <span class="badge">第一幕 · 0:00-2:00</span>
  <h1>开场钩子</h1>
  <p class="subtitle">前 30 秒决定观众留不留</p>

  <div class="section">
    <h2>说什么</h2>
    <p>"你有没有刷到过知乎上那种几百条回答的热帖？"</p>
  </div>

  <div class="section">
    <h2>举例子</h2>
    <ul>
      <li>「年轻人该不该躺平」<span class="highlight">354 条回答</span></li>
      <li>看了 20 分钟越看越乱</li>
      <li>躺平派 vs 奋斗派，评论区全是互喷</li>
    </ul>
  </div>

  <div class="quote">
    "但如果让 AI 把 354 条全读一遍，你猜怎么着？80% 的人其实在说同一件事。"
  </div>

  <div class="section">
    <h2>引出产品</h2>
    <p>"这就是我做「众声」的原因 —— 让你看到吵架背后真正的分歧在哪。"</p>
  </div>

  <div class="timer">⏱ 控制在 2 分钟内 → 然后切到产品演示</div>
</div>
</body>
</html>
