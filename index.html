<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>众声 Voices — 知乎讨论理解地图</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0818;
    color: #fff;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  /* ============ Courtroom Scene ============ */
  .courtroom {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .court-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #1a1028 0%, #2a1838 30%, #1e1030 60%, #0e0818 100%);
    z-index: 0;
  }

  /* Speed lines background effect */
  .speed-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s;
    background: repeating-conic-gradient(
      rgba(255,255,255,0.03) 0deg 2deg,
      transparent 2deg 10deg
    ) center/100% 100%;
  }
  .speed-lines.active { opacity: 1; }

  .bench {
    position: absolute;
    bottom: 220px;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(180deg, #8a6040, #6a4530, #4a3020);
    z-index: 5;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  /* ============ Characters ============ */
  .character {
    position: absolute;
    bottom: 228px;
    z-index: 4;
    transition: opacity 0.4s, transform 0.4s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .character.left { left: 6%; }
  .character.right { right: 6%; }
  .character.hidden { opacity: 0; transform: translateY(30px); }

  /* Meme-style character card */
  .char-card {
    width: 200px;
    height: 260px;
    border-radius: 16px;
    position: relative;
    overflow: visible;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 3px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
  }

  .char-emoji {
    font-size: 80px;
    line-height: 1;
    transition: transform 0.2s;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }

  .char-title {
    font-size: 13px;
    font-weight: 700;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.7);
  }

  .char-catchphrase {
    font-size: 11px;
    margin-top: 6px;
    color: rgba(255,255,255,0.4);
    max-width: 160px;
    text-align: center;
    line-height: 1.4;
  }

  .char-label {
    font-size: 16px;
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 6px;
    margin-top: 12px;
    letter-spacing: 3px;
  }

  /* Comic effect overlays on characters */
  .comic-effect {
    position: absolute;
    font-size: 24px;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }
  .comic-effect.active {
    opacity: 1;
    animation: comicPop 0.6s ease-out forwards;
  }
  @keyframes comicPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    50% { transform: scale(1.3) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 0.9; }
  }
  .effect-anger { top: -10px; right: -10px; }
  .effect-sweat { top: 0; right: -5px; }
  .effect-spark { top: -15px; left: 50%; transform: translateX(-50%); }
  .effect-heart { top: -10px; right: -10px; }

  /* Character colors */
  .char-lying .char-card { background: linear-gradient(135deg, rgba(232,120,90,0.15), rgba(232,120,90,0.05)); }
  .char-lying .char-label { background: #e8785a; color: #1a0a0a; }

  .char-hustle .char-card { background: linear-gradient(135deg, rgba(90,154,232,0.15), rgba(90,154,232,0.05)); }
  .char-hustle .char-label { background: #5a9ae8; color: #1a0a0a; }

  .char-selective .char-card { background: linear-gradient(135deg, rgba(160,120,224,0.15), rgba(160,120,224,0.05)); }
  .char-selective .char-label { background: #a078e0; color: #1a0a0a; }

  .char-reform .char-card { background: linear-gradient(135deg, rgba(80,192,160,0.15), rgba(80,192,160,0.05)); }
  .char-reform .char-label { background: #50c0a0; color: #1a0a0a; }

  .char-system .char-card { background: linear-gradient(135deg, rgba(224,192,80,0.15), rgba(224,192,80,0.05)); }
  .char-system .char-label { background: #e0c050; color: #1a0a0a; }

  /* Slam/entrance animation */
  .char-slam { animation: slamIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes slamIn {
    0% { transform: translateX(-60px) scale(1.1); opacity: 0; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  .char-slam-right { animation: slamInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes slamInRight {
    0% { transform: translateX(60px) scale(1.1); opacity: 0; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }

  /* ============ Dialogue Box ============ */
  .dialogue-box {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    background: linear-gradient(180deg, #0c0c20 0%, #0a0a1a 100%);
    border-top: 3px solid #4a4a8a;
    z-index: 10;
    padding: 18px 36px 24px;
    display: flex;
    flex-direction: column;
  }

  .speaker-name {
    font-size: 16px;
    font-weight: 900;
    padding: 5px 18px;
    display: inline-block;
    border-radius: 6px;
    margin-bottom: 12px;
    letter-spacing: 3px;
    width: fit-content;
  }

  .dialogue-text {
    font-size: 22px;
    line-height: 1.8;
    font-weight: 400;
    flex: 1;
    overflow: hidden;
  }

  .dialogue-text .cursor {
    display: inline-block;
    width: 3px;
    height: 24px;
    background: #f8d56e;
    margin-left: 3px;
    animation: blink 0.5s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Emphasis text styling */
  .dialogue-text .em { color: #f8d56e; font-weight: 700; }
  .dialogue-text .hot { color: #ff6b6b; font-weight: 700; }

  .advance-hint {
    position: absolute;
    bottom: 14px;
    right: 28px;
    font-size: 13px;
    color: #4a4a6a;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* ============ OBJECTION Overlay ============ */
  .objection-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  .objection-overlay.active {
    animation: objFlash 1.4s ease-out forwards;
  }
  @keyframes objFlash {
    0% { opacity: 1; background: #fff; }
    8% { background: rgba(255,50,50,0.3); }
    15% { background: transparent; }
    100% { opacity: 0; }
  }

  .objection-text {
    font-size: 90px;
    font-weight: 900;
    color: #ff3030;
    text-shadow: 5px 5px 0 #800000, -3px -3px 0 #800000, 0 0 40px rgba(255,50,50,0.5);
    letter-spacing: 10px;
    transform: scale(0);
  }
  .objection-overlay.active .objection-text {
    animation: objScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes objScale {
    0% { transform: scale(0) rotate(-8deg); }
    50% { transform: scale(1.3) rotate(3deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .consensus-text {
    font-size: 64px;
    font-weight: 900;
    color: #50e0b0;
    text-shadow: 4px 4px 0 #1a4a3a, -3px -3px 0 #1a4a3a, 0 0 40px rgba(80,224,176,0.4);
    letter-spacing: 8px;
    transform: scale(0);
  }
  .objection-overlay.active .consensus-text {
    animation: objScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .holdit-text {
    font-size: 72px;
    font-weight: 900;
    color: #f8d56e;
    text-shadow: 4px 4px 0 #805020, -3px -3px 0 #805020, 0 0 40px rgba(248,213,110,0.4);
    letter-spacing: 8px;
    transform: scale(0);
  }
  .objection-overlay.active .holdit-text {
    animation: objScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  /* ============ Screen Effects ============ */
  .shake { animation: shake 0.5s ease-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-12px) rotate(-0.5deg); }
    30% { transform: translateX(10px) rotate(0.5deg); }
    45% { transform: translateX(-8px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
  }

  .big-shake { animation: bigShake 0.6s ease-out; }
  @keyframes bigShake {
    0%, 100% { transform: translateX(0); }
    10% { transform: translateX(-20px) rotate(-1deg); }
    25% { transform: translateX(16px) rotate(1deg); }
    40% { transform: translateX(-12px) rotate(-0.5deg); }
    55% { transform: translateX(8px); }
    70% { transform: translateX(-4px); }
  }

  /* ============ Title Screen ============ */
  .title-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: linear-gradient(135deg, #0a0818, #1a1030, #0e0620);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s;
  }
  .title-screen.hidden { opacity: 0; pointer-events: none; }

  .title-screen h1 {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: 24px;
    background: linear-gradient(135deg, #f8d56e, #f0a050, #e87850);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .title-screen .sub {
    font-size: 16px;
    color: #6a6090;
    letter-spacing: 6px;
    margin-bottom: 48px;
  }

  .title-screen .case-file {
    background: #141420;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 24px 40px;
    text-align: center;
    margin-bottom: 40px;
  }
  .case-file .case-label {
    font-size: 12px;
    color: #e8785a;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .case-file .case-q {
    font-size: 26px;
    font-weight: 700;
    color: #e0d0f0;
  }
  .case-file .case-stats {
    font-size: 13px;
    color: #4a4a6a;
    margin-top: 12px;
  }

  .title-screen .start-btn {
    background: linear-gradient(135deg, #f8d56e, #f0a050);
    color: #1a0a0a;
    border: none;
    padding: 18px 56px;
    font-size: 22px;
    font-weight: 900;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 6px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(248,213,110,0.3);
  }
  .title-screen .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(248,213,110,0.5);
  }

  /* ============ Consensus Card ============ */
  .consensus-card {
    position: fixed;
    inset: 0;
    z-index: 150;
    background: rgba(5,5,15,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
  }
  .consensus-card.active { opacity: 1; pointer-events: auto; }

  .consensus-card h2 {
    font-size: 22px;
    color: #50e0b0;
    letter-spacing: 8px;
    margin-bottom: 36px;
    font-weight: 900;
  }

  .consensus-items {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
  }
  .consensus-item {
    background: linear-gradient(135deg, #1a2030, #12181f);
    border: 1px solid #2a4040;
    border-radius: 16px;
    padding: 28px 20px;
    width: 200px;
    text-align: center;
    opacity: 0;
    animation: cardReveal 0.5s forwards;
  }
  .consensus-item:nth-child(1) { animation-delay: 0.3s; }
  .consensus-item:nth-child(2) { animation-delay: 0.6s; }
  .consensus-item:nth-child(3) { animation-delay: 0.9s; }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .consensus-item .pct {
    font-size: 44px;
    font-weight: 900;
    color: #50e0b0;
  }
  .consensus-item .label {
    font-size: 15px;
    margin-top: 10px;
    color: #c0d0d0;
    line-height: 1.6;
  }

  .warmth-msg {
    max-width: 520px;
    text-align: center;
    font-size: 17px;
    color: #7a8a9a;
    line-height: 2.2;
    margin-bottom: 36px;
    opacity: 0;
    animation: cardReveal 0.6s 1.5s forwards;
  }
  .warmth-msg em { color: #f0a050; font-style: normal; font-weight: 700; }

  .consensus-card .restart-btn {
    background: transparent;
    border: 1px solid #3a3a5a;
    color: #7a7aa0;
    padding: 12px 36px;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    opacity: 0;
    animation: cardReveal 0.4s 2s forwards;
  }

  /* ============ VS splash ============ */
  .vs-splash {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,5,20,0.92);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .vs-splash.active { opacity: 1; }
  .vs-splash .vs-text {
    font-size: 72px;
    font-weight: 900;
    color: #f8d56e;
    text-shadow: 4px 4px 0 #805020, 0 0 30px rgba(248,213,110,0.3);
    letter-spacing: 10px;
  }
  .vs-splash .vs-names {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 12%;
  }
  .vs-splash .vs-name {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 4px;
  }
  .vs-splash .vs-emoji {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .vs-splash .vs-side {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ============ Progress ============ */
  .progress {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  .progress .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a4a;
    transition: background 0.3s;
  }
  .progress .dot.active { background: #f8d56e; }
  .progress .dot.done { background: #50c0a0; }
</style>
</head>
<body>

<!-- Title Screen -->
<div class="title-screen" id="titleScreen">
  <h1>众 声</h1>
  <div class="sub">VOICES — 知乎讨论理解地图</div>

  <div class="case-file">
    <div class="case-label">▎ 案 件 编 号 #2024-0417 ▎</div>
    <div class="case-q">「年轻人到底该不该躺平？」</div>
    <div class="case-stats">354 条回答 · 12 位核心讨论者 · 5 大观点阵营</div>
  </div>

  <button class="start-btn" id="startBtn">开 庭</button>
</div>

<!-- Main Courtroom -->
<div class="courtroom" id="courtroom">
  <div class="court-bg"></div>
  <div class="speed-lines" id="speedLines"></div>

  <div class="progress" id="progress"></div>
  <div class="bench"></div>

  <!-- Left character -->
  <div class="character left hidden" id="charLeft">
    <div class="char-card" id="charLeftCard">
      <div class="comic-effect effect-anger" id="effectLeft"></div>
      <div class="char-emoji" id="charLeftEmoji"></div>
      <div class="char-title" id="charLeftTitle"></div>
      <div class="char-catchphrase" id="charLeftCatch"></div>
    </div>
    <div class="char-label" id="charLeftLabel"></div>
  </div>

  <!-- Right character -->
  <div class="character right hidden" id="charRight">
    <div class="char-card" id="charRightCard">
      <div class="comic-effect effect-anger" id="effectRight"></div>
      <div class="char-emoji" id="charRightEmoji"></div>
      <div class="char-title" id="charRightTitle"></div>
      <div class="char-catchphrase" id="charRightCatch"></div>
    </div>
    <div class="char-label" id="charRightLabel"></div>
  </div>

  <!-- Dialogue Box -->
  <div class="dialogue-box" id="dialogueBox">
    <div class="speaker-name" id="speakerName"></div>
    <div class="dialogue-text" id="dialogueText"></div>
    <div class="advance-hint">点击继续 ▼</div>
  </div>

  <!-- Objection Overlay -->
  <div class="objection-overlay" id="objOverlay">
    <div id="objText"></div>
  </div>

  <!-- VS Splash -->
  <div class="vs-splash" id="vsSplash">
    <div class="vs-names" id="vsNames"></div>
    <div class="vs-text">VS</div>
  </div>
</div>

<!-- Consensus Card -->
<div class="consensus-card" id="consensusCard">
  <h2>— 隐 藏 共 识 —</h2>
  <div class="consensus-items">
    <div class="consensus-item">
      <div class="pct">100%</div>
      <div class="label">所有阵营都认为<br>当前竞争压力不可持续</div>
    </div>
    <div class="consensus-item">
      <div class="pct">92%</div>
      <div class="label">连「躺平派」也不反对努力<br>只反对被迫内卷</div>
    </div>
    <div class="consensus-item">
      <div class="pct">88%</div>
      <div class="label">各阵营都在追求<br>「自己定义的好生活」</div>
    </div>
  </div>
  <div class="warmth-msg">
    这场 354 条回答的讨论里，人们以为自己在吵架。<br>
    但 Agent 对话发现，<em>他们在 80% 的事情上完全一致</em>。<br>
    真正的分歧，只有一条线。<br>
    而那条线的两边，站着的是同一种渴望。
  </div>
  <button class="restart-btn" id="restartBtn">再 审 一 次</button>
</div>

<script>
// ============ Character Definitions (Meme-style) ============
const CHARS = {
  lying: {
    name: '躺平派',
    cls: 'char-lying',
    color: '#e8785a',
    emoji: '🛋️',
    title: '「卷什么卷，不如躺着」',
    catchphrase: '葛优瘫 · 佛系青年 · 精神离职',
    angry_emoji: '😤',
    shock_emoji: '😳',
    think_emoji: '🤔',
    moved_emoji: '🥺'
  },
  hustle: {
    name: '奋斗派',
    cls: 'char-hustle',
    color: '#5a9ae8',
    emoji: '💪',
    title: '「机会只留给有准备的人」',
    catchphrase: '鸡汤达人 · 早起打卡 · 996福报',
    angry_emoji: '😡',
    shock_emoji: '😲',
    think_emoji: '🧐',
    point_emoji: '👉'
  },
  selective: {
    name: '选择派',
    cls: 'char-selective',
    color: '#a078e0',
    emoji: '⚖️',
    title: '「该卷卷，该躺躺」',
    catchphrase: '精力管理大师 · 整顿职场',
    angry_emoji: '😤',
    shock_emoji: '😱',
    think_emoji: '🤨',
    moved_emoji: '😌'
  },
  reform: {
    name: '改革派',
    cls: 'char-reform',
    color: '#50c0a0',
    emoji: '🔧',
    title: '「别讨论躺不躺，讨论怎么改」',
    catchphrase: '制度分析师 · 结构性吐槽',
    angry_emoji: '🤬',
    shock_emoji: '😮',
    think_emoji: '🤔',
    point_emoji: '☝️'
  },
  system: {
    name: '众声系统',
    cls: 'char-system',
    color: '#e0c050',
    emoji: '⚡',
    title: '「我只说事实」',
    catchphrase: '观点分析引擎',
    think_emoji: '🔍'
  }
};

// ============ Script — Mixed Tone ============
const SCRIPT = [
  // Opening
  { type: 'narrate', speaker: 'system', text: '载入知乎讨论「年轻人到底该不该躺平」…… 354 条回答已分析完毕。' },
  { type: 'narrate', speaker: 'system', text: '识别到 5 个核心观点阵营。观点 Agent 已就位。准备开庭。' },

  // === Act 1: 躺平 vs 奋斗 — 嘴炮阶段 ===
  { type: 'vs', left: 'lying', right: 'hustle' },

  // 嘴炮开场
  { type: 'say', side: 'left', char: 'lying', expr: 'default',
    text: '各位好，我是躺平派代表。今天我的论点很简单——房价是年收入 30 倍的城市里，「努力就能成功」这句话，属于诈骗。', effect: 'none' },

  { type: 'say', side: 'right', char: 'hustle', expr: 'angry',
    text: '你这开场就扣帽子是吧？照你这逻辑，每天发「早安打工人」的都是受害者咯？', effect: 'anger' },

  { type: 'say', side: 'left', char: 'lying', expr: 'default',
    text: '不不不，你们发早安打工人的，那叫斯德哥尔摩综合症，谢谢。', effect: 'none' },

  { type: 'say', side: 'right', char: 'hustle', expr: 'angry',
    text: '好好好，开始人身攻击了是吧？？', effect: 'anger' },

  // 转折 — 奋斗派发现关键矛盾
  { type: 'objection', text: '等一下！', style: 'holdit' },

  { type: 'say', side: 'right', char: 'hustle', expr: 'think',
    text: '我突然注意到——你说的是「系统回报率低」，不是「努力没用」。这是两件完全不同的事。', effect: 'none' },

  { type: 'say', side: 'left', char: 'lying', expr: 'shock',
    text: '……', effect: 'sweat' },

  // 正经辩论阶段
  { type: 'say', side: 'right', char: 'hustle', expr: 'think',
    text: '我认真问你：你反对的到底是「努力」这件事本身，还是「被迫的、没有选择的努力」？', effect: 'none' },

  { type: 'say', side: 'left', char: 'lying', expr: 'think',
    text: '……是被迫。如果是自己选的方向，我其实从来不排斥付出。', effect: 'none' },

  // 第一次共识
  { type: 'objection', text: '共识发现！', style: 'consensus' },

  { type: 'say', side: 'left', char: 'system', expr: 'default',
    text: '记录第一项共识：双方争论的核心不是「该不该努力」——而是「努力的自主权应不应该属于个人」。', effect: 'spark' },

  // === Act 2: 选择派 vs 改革派 ===
  { type: 'vs', left: 'selective', right: 'reform' },

  { type: 'say', side: 'left', char: 'selective', expr: 'default',
    text: '我的策略很简单嘛：我在乎的事拼命干，不在乎的事直接躺，有什么问题？', effect: 'none' },

  { type: 'say', side: 'right', char: 'reform', expr: 'think',
    text: '问题是——你有没有想过，为什么你需要做这个取舍？如果系统合理，你根本不用「选择性」躺平。', effect: 'none' },

  { type: 'say', side: 'left', char: 'selective', expr: 'shock',
    text: '……等下，你说得好像有道理。我以为我在做自由选择，实际上是在有限资源下做生存策略？', effect: 'sweat' },

  // 改革派抛出核心问题
  { type: 'objection', text: '异议！', style: 'objection' },

  { type: 'say', side: 'right', char: 'reform', expr: 'point',
    text: '所以真正的问题从来就不是「躺不躺」——而是：个人行动，到底能不能改变系统？', effect: 'spark' },

  // === 真相揭示 ===
  { type: 'narrate', speaker: 'system', text: '整场 354 条讨论，真正的分歧线只有一条——' },

  { type: 'narrate', speaker: 'system', text: '「相信个人能改变系统」vs「认为系统只能被结构性力量改变」。其他所有争论，都是这条线的投影。' },

  { type: 'objection', text: '真相大白！', style: 'consensus' },

  // 温暖收尾
  { type: 'narrate', speaker: 'system', text: '354 条回答，12 位讨论者，看似水火不容。但 Agent 对话发现——他们在 80% 的事情上，完全一致。' },

  { type: 'consensus' }
];

// ============ Engine ============
let currentStep = 0;
let isTyping = false;
let isLocked = false;
let typeTimer = null;
let fullText = '';

const $ = id => document.getElementById(id);

function initProgress() {
  const prog = $('progress');
  prog.innerHTML = '';
  // Only show dots for non-auto-advance steps
  SCRIPT.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    prog.appendChild(dot);
  });
}

function updateProgress(step) {
  const dots = document.querySelectorAll('.progress .dot');
  dots.forEach((d, i) => {
    if (i < step) d.className = 'dot done';
    else if (i === step) d.className = 'dot active';
    else d.className = 'dot';
  });
}

function setChar(side, charId, expr) {
  const el = $(side === 'left' ? 'charLeft' : 'charRight');
  const char = CHARS[charId];

  // Reset classes
  el.className = `character ${side}`;
  el.classList.add(char.cls);
  el.classList.remove('hidden');

  // Set emoji based on expression
  const emojiEl = $(side === 'left' ? 'charLeftEmoji' : 'charRightEmoji');
  let emoji = char.emoji;
  if (expr === 'angry' && char.angry_emoji) emoji = char.angry_emoji;
  if (expr === 'shock' && char.shock_emoji) emoji = char.shock_emoji;
  if (expr === 'think' && char.think_emoji) emoji = char.think_emoji;
  if (expr === 'point' && char.point_emoji) emoji = char.point_emoji;
  if (expr === 'moved' && char.moved_emoji) emoji = char.moved_emoji;
  emojiEl.textContent = emoji;

  // Set text
  $(side === 'left' ? 'charLeftTitle' : 'charRightTitle').textContent = char.title;
  $(side === 'left' ? 'charLeftCatch' : 'charRightCatch').textContent = char.catchphrase;
  $(side === 'left' ? 'charLeftLabel' : 'charRightLabel').textContent = char.name;
  $(side === 'left' ? 'charLeftLabel' : 'charRightLabel').style.background = char.color;
}

function showEffect(side, type) {
  if (type === 'none') return;
  const el = $(side === 'left' ? 'effectLeft' : 'effectRight');
  el.className = 'comic-effect';

  const effects = {
    anger: { text: '💢', cls: 'effect-anger' },
    sweat: { text: '💧', cls: 'effect-sweat' },
    spark: { text: '✨', cls: 'effect-spark' },
    heart: { text: '💛', cls: 'effect-heart' }
  };

  const e = effects[type];
  if (!e) return;
  el.textContent = e.text;
  el.classList.add(e.cls);
  // Trigger animation
  requestAnimationFrame(() => {
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 800);
  });
}

function hideChar(side) {
  $(side === 'left' ? 'charLeft' : 'charRight').classList.add('hidden');
}

function typeWrite(text, speakerName, speakerColor) {
  const textEl = $('dialogueText');
  const nameEl = $('speakerName');

  nameEl.textContent = speakerName;
  nameEl.style.background = speakerColor;
  nameEl.style.color = '#fff';
  if (speakerColor === '#e0c050' || speakerColor === '#f8d56e') {
    nameEl.style.color = '#1a0a0a';
  }

  textEl.innerHTML = '';
  fullText = text;
  isTyping = true;
  let i = 0;

  typeTimer = setInterval(() => {
    if (i < text.length) {
      textEl.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
      i++;
    } else {
      clearInterval(typeTimer);
      textEl.innerHTML = text;
      isTyping = false;
    }
  }, 35);
}

function skipType() {
  if (isTyping) {
    clearInterval(typeTimer);
    $('dialogueText').innerHTML = fullText;
    isTyping = false;
  }
}

function showObjection(text, style) {
  return new Promise(resolve => {
    const overlay = $('objOverlay');
    const textEl = $('objText');

    if (style === 'consensus') textEl.className = 'consensus-text';
    else if (style === 'holdit') textEl.className = 'holdit-text';
    else textEl.className = 'objection-text';

    textEl.textContent = text;
    overlay.className = 'objection-overlay active';

    // Screen shake
    const shakeClass = style === 'objection' ? 'big-shake' : 'shake';
    $('courtroom').classList.add(shakeClass);
    setTimeout(() => $('courtroom').classList.remove(shakeClass), 600);

    // Speed lines for objection
    if (style === 'objection' || style === 'holdit') {
      $('speedLines').classList.add('active');
      setTimeout(() => $('speedLines').classList.remove('active'), 800);
    }

    setTimeout(() => {
      overlay.className = 'objection-overlay';
      resolve();
    }, 1400);
  });
}

function showVS(leftId, rightId) {
  return new Promise(resolve => {
    const splash = $('vsSplash');
    const names = $('vsNames');
    const L = CHARS[leftId];
    const R = CHARS[rightId];

    names.innerHTML = `
      <div class="vs-side">
        <div class="vs-emoji">${L.emoji}</div>
        <div class="vs-name" style="color:${L.color}">${L.name}</div>
      </div>
      <div class="vs-side">
        <div class="vs-emoji">${R.emoji}</div>
        <div class="vs-name" style="color:${R.color}">${R.name}</div>
      </div>
    `;
    splash.classList.add('active');

    setTimeout(() => {
      splash.classList.remove('active');
      resolve();
    }, 1600);
  });
}

async function executeStep(step) {
  const s = SCRIPT[step];
  if (!s) return;
  updateProgress(step);

  switch (s.type) {
    case 'narrate':
      hideChar('left');
      hideChar('right');
      typeWrite(s.text, '众声系统', '#e0c050');
      break;

    case 'vs':
      isLocked = true;
      await showVS(s.left, s.right);
      setChar('left', s.left, 'default');
      setChar('right', s.right, 'default');
      currentStep++;
      isLocked = false;
      await executeStep(currentStep);
      return;

    case 'say':
      setChar(s.side, s.char, s.expr);
      if (s.effect) showEffect(s.side, s.effect);
      const char = CHARS[s.char];
      typeWrite(s.text, char.name, char.color);
      break;

    case 'objection':
      isLocked = true;
      await showObjection(s.text, s.style);
      currentStep++;
      isLocked = false;
      await executeStep(currentStep);
      return;

    case 'consensus':
      $('consensusCard').classList.add('active');
      return;
  }
}

// Click handler
document.addEventListener('click', (e) => {
  if (e.target.id === 'startBtn') return;
  if (e.target.id === 'restartBtn') return;
  if (!$('titleScreen').classList.contains('hidden')) return;
  if ($('consensusCard').classList.contains('active')) return;
  if (isLocked) return;

  if (isTyping) {
    skipType();
    return;
  }

  currentStep++;
  if (currentStep < SCRIPT.length) {
    executeStep(currentStep);
  }
});

$('startBtn').addEventListener('click', () => {
  $('titleScreen').classList.add('hidden');
  initProgress();
  currentStep = 0;
  executeStep(0);
});

$('restartBtn').addEventListener('click', () => {
  $('consensusCard').classList.remove('active');
  currentStep = 0;
  hideChar('left');
  hideChar('right');
  $('titleScreen').classList.remove('hidden');
});
</script>

</body>
</html>
